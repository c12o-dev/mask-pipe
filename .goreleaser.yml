version: 2

project_name: mask-pipe

before:
  hooks:
    - go test ./...

builds:
  - main: ./cmd/mask-pipe
    binary: mask-pipe
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^test:"

brews:
  - repository:
      owner: c12o-dev
      name: homebrew-tap
    homepage: https://github.com/c12o-dev/mask-pipe
    description: Filter secrets from terminal output
    license: MIT
    skip_upload: true  # change to 'auto' after creating c12o-dev/homebrew-tap
